<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../favicon.ico?v=2" type="image/x-icon">
    <title>Team jageon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 30px 20px;
        }
        /* 返回首页按钮 */
        .back-home {
            display: inline-block;
            margin-bottom: 30px;
            color: #0066cc;
            text-decoration: none;
            font-size: 16px;
        }
        .back-home:hover {
            text-decoration: underline;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #222;
            font-size: 28px;
        }
        /* 画廊容器 网格布局 */
        .gallery-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }
        /* 作品卡片窗口 */
        .work-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.09);
            transition: all 0.25s ease;
            text-decoration: none;
            display: block;
        }
        .work-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        /* 卡片图片区域 */
        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        /* 卡片文字 */
        .card-text {
            padding: 14px;
        }
        .card-text h3 {
            font-size: 16px;
            color: #222;
            margin-bottom: 6px;
        }
        .card-text p {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>
    <!-- 返回首页 -->
    <a href="../index.html" class="back-home">← 返回首页</a>

    <h1>Team jageon 作品</h1>

    <div class="gallery-wrap">
        <!-- 卡片1 修改href为你的友链，src替换作品图 -->
        <a href="#" target="_blank" class="work-card">
            <img class="card-img" src="../img/work1.png" alt="作品1">
            <div class="card-text">
                <h3>作品项目一</h3>
                <p>介绍</p>
            </div>
        </a>

        <!-- 卡片2 -->
        <a href="#" target="_blank" class="work-card">
            <img class="card-img" src="../img/work2.png" alt="作品2">
            <div class="card-text">
                <h3>作品项目二</h3>
                <p>介绍</p>
            </div>
        </a>

        <!-- 卡片3 -->
        <a href="#" target="_blank" class="work-card">
            <img class="card-img" src="../img/work3.png" alt="作品3">
            <div class="card-text">
                <h3>作品项目三</h3>
                <p>介绍</p>
            </div>
        </a>

        <!-- 复制上面区块可以无限增加更多作品卡片 -->
    </div>
</body>
</html>
